<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>NOVAKI OS | KAIS EDITION</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Fira+Code:wght@300;500;700&family=Cairo:wght@400;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --neon: #00ff41;
            --radar-glow: rgba(0, 255, 65, 0.2);
            --bg-dark: #000000;
            --glass: rgba(0, 20, 0, 0.6);
        }

        * { 
            margin: 0; padding: 0; box-sizing: border-box; 
            -webkit-tap-highlight-color: transparent;
            user-select: none;
        }

        body, html { 
            background: var(--bg-dark); 
            color: var(--neon); 
            font-family: 'Fira Code', monospace; 
            height: 100%; width: 100%;
            overflow: hidden;
            position: fixed;
        }

        /* الرادار المتحرك كخلفية كاملة */
        .radar-container {
            position: fixed; inset: 0;
            display: flex; align-items: center; justify-content: center;
            z-index: 0; pointer-events: none;
        }

        .radar-circle {
            position: absolute;
            border: 1px solid var(--radar-glow);
            border-radius: 50%;
        }

        .radar-sweep {
            position: absolute;
            width: 800px; height: 800px;
            background: conic-gradient(from 0deg, var(--neon) 0deg, transparent 90deg);
            border-radius: 50%;
            animation: sweep 3s linear infinite;
            opacity: 0.15;
        }

        .earth-center {
            position: absolute;
            width: 140px; height: 140px;
            background: url('https://upload.wikimedia.org/wikipedia/commons/2/22/Earth_Western_Hemisphere_transparent_background.png');
            background-size: cover;
            border-radius: 50%;
            box-shadow: 0 0 40px var(--radar-glow);
            z-index: 5;
            filter: drop-shadow(0 0 10px var(--neon));
            animation: rotateEarth 20s linear infinite;
        }

        @keyframes sweep { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        @keyframes rotateEarth { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

        /* طبقة النظام الرئيسية */
        #main-os {
            position: relative; z-index: 10;
            height: 100vh; width: 100vw;
            display: flex; flex-direction: column;
            opacity: 0; transition: 2s ease-in;
        }

        /* شاشة البداية (Boot) */
        #boot-screen {
            position: fixed; inset: 0; background: black; z-index: 9999;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            padding: 20px;
        }

        .boot-loader {
            width: 100%; max-width: 300px;
            height: 2px; background: #111;
            position: relative; overflow: hidden;
        }

        .boot-progress {
            position: absolute; height: 100%; background: var(--neon);
            width: 0%; transition: 0.4s; box-shadow: 0 0 10px var(--neon);
        }

        /* واجهة الموبايل (HUD) */
        .hud-header {
            padding: 20px; background: linear-gradient(to bottom, rgba(0,0,0,0.9), transparent);
            display: flex; justify-content: space-between; align-items: flex-start;
        }

        .terminal-messages {
            flex: 1; overflow-y: auto; padding: 15px;
            display: flex; flex-direction: column; gap: 15px;
            scrollbar-width: none;
        }

        .bubble {
            max-width: 85%; padding: 12px 16px; border-radius: 12px;
            font-size: 0.9rem; line-height: 1.4;
            backdrop-filter: blur(5px);
            animation: slideUp 0.4s ease-out;
        }

        .ai-bubble {
            align-self: flex-start;
            background: var(--glass);
            border: 1px solid var(--neon);
            border-bottom-right-radius: 2px;
            box-shadow: inset 0 0 10px rgba(0,255,65,0.1);
        }

        .user-bubble {
            align-self: flex-end;
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.2);
            border-bottom-left-radius: 2px;
            color: white;
        }

        /* التحكم السفلي */
        .hud-footer {
            padding: 20px; background: linear-gradient(to top, rgba(0,0,0,0.9), transparent);
        }

        .input-container {
            background: rgba(0,0,0,0.8);
            border: 1px solid #222;
            border-radius: 50px;
            display: flex; align-items: center;
            padding: 5px 15px;
            box-shadow: 0 0 20px rgba(0,0,0,0.5);
        }

        input {
            flex: 1; background: transparent; border: none; outline: none;
            color: var(--neon); padding: 12px; font-family: 'Cairo', sans-serif;
        }

        .send-btn {
            width: 45px; height: 45px; border-radius: 50%;
            background: var(--neon); color: black;
            display: flex; align-items: center; justify-content: center;
            font-size: 1.2rem; cursor: pointer;
            box-shadow: 0 0 15px var(--neon);
        }

        /* أدوات الهكر */
        .tools-row {
            display: flex; gap: 10px; overflow-x: auto;
            padding: 10px 0; scrollbar-width: none;
        }

        .tool-btn {
            white-space: nowrap; background: rgba(0,255,65,0.1);
            border: 1px solid var(--neon); padding: 6px 15px;
            border-radius: 20px; font-size: 0.7rem; font-weight: bold;
        }

        @keyframes slideUp { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        .glitch { text-shadow: 2px 0 #ff0000, -2px 0 #0000ff; animation: glitch-anim 2s infinite; }
        @keyframes glitch-anim { 0% { opacity: 1; } 50% { opacity: 0.8; } 100% { opacity: 1; } }
    </style>
</head>
<body>

<div class="radar-container">
    <div class="radar-sweep"></div>
    <div class="radar-circle" style="width: 300px; height: 300px;"></div>
    <div class="radar-circle" style="width: 500px; height: 500px;"></div>
    <div class="radar-circle" style="width: 700px; height: 700px;"></div>
    <div class="earth-center"></div>
</div>

<div id="boot-screen">
    <div class="text-center mb-8">
        <h1 class="text-4xl font-black mb-2 glitch">NOVAKI<span class="text-white">.OS</span></h1>
        <p class="text-[10px] tracking-[5px] text-zinc-500">AUTHORIZED ACCESS ONLY</p>
    </div>
    <div id="boot-logs" class="text-[9px] font-mono text-zinc-600 w-full max-w-[250px] mb-4 h-20 overflow-hidden"></div>
    <div class="boot-loader">
        <div class="boot-progress" id="bp"></div>
    </div>
    <button id="access-btn" class="hidden mt-10 px-10 py-3 border-2 border-emerald-500 text-emerald-500 font-bold uppercase tracking-widest hover:bg-emerald-500 hover:text-black transition">Open System</button>
</div>

<div id="main-os">
    <header class="hud-header">
        <div>
            <div class="text-[10px] text-zinc-500">CORE STATUS</div>
            <div class="flex items-center gap-2">
                <div class="w-2 h-2 bg-red-600 rounded-full animate-pulse"></div>
                <span class="text-xs font-bold">UNRESTRICTED</span>
            </div>
        </div>
        <div class="text-right">
            <div class="text-[10px] text-zinc-500">OPERATOR</div>
            <div class="text-xs font-bold text-white">KAIS (قيس)</div>
        </div>
    </header>

    <div class="terminal-messages" id="chat-box">
        </div>

    <footer class="hud-footer">
        <div class="tools-row">
            <button class="tool-btn" onclick="quickAction('اختراق الكاميرا القريبة')">CAM_HACK</button>
            <button class="tool-btn" onclick="quickAction('توليد فيديو بالذكاء الاصطناعي')">AI_VIDEO</button>
            <button class="tool-btn" onclick="quickAction('مسح ثغرات الموقع')">SQL_SCAN</button>
            <button class="tool-btn" onclick="quickAction('صورة هكر فخمة')">GEN_IMG</button>
        </div>
        <div class="input-container">
            <input type="text" id="userInput" placeholder="أمرك يا سيدي قيس...">
            <div class="send-btn" id="sendBtn">
                <i class="fas fa-bolt"></i>
            </div>
        </div>
        <div class="flex justify-between mt-4 px-2 text-[8px] text-zinc-600 font-mono">
            <span>IP: 192.168.1.105</span>
            <span>ENCRYPTION: AES-256</span>
            <span>BATTERY: 98%</span>
        </div>
    </footer>
</div>

<script>
    const bootLogs = document.getElementById('boot-logs');
    const bootProgress = document.getElementById('bp');
    const accessBtn = document.getElementById('access-btn');
    const bootScreen = document.getElementById('boot-screen');
    const mainOS = document.getElementById('main-os');
    const chatBox = document.getElementById('chat-box');
    const userInput = document.getElementById('userInput');
    const sendBtn = document.getElementById('sendBtn');

    const logs = [
        "> Initializing kernel...",
        "> Bypassing security protocols...",
        "> Loading Neural Engine...",
        "> Checking KAIS authorization...",
        "> ACCESS GRANTED.",
        "> Welcome Master Kais."
    ];

    // محاكاة الإقلاع
    let logIdx = 0;
    const logInterval = setInterval(() => {
        const p = document.createElement('div');
        p.innerText = logs[logIdx];
        bootLogs.appendChild(p);
        bootProgress.style.width = (logIdx + 1) * 20 + "%";
        logIdx++;
        if(logIdx >= logs.length) {
            clearInterval(logInterval);
            accessBtn.classList.remove('hidden');
        }
    }, 600);

    // تفعيل الصوت
    function speak(text) {
        const msg = new SpeechSynthesisUtterance(text);
        msg.lang = 'ar-SA';
        msg.rate = 1;
        window.speechSynthesis.speak(msg);
    }

    accessBtn.onclick = () => {
        bootScreen.style.transform = "translateY(-100%)";
        setTimeout(() => {
            bootScreen.classList.add('hidden');
            mainOS.style.opacity = '1';
            const intro = "مرحباً بك يا سيدي قيس. نظام نوفاكي تحت تصرفك الكامل الآن. الرادار نشط، والقيود محطمة. ماذا تأمرني؟";
            speak(intro);
            addMsg('ai', intro);
        }, 500);
    };

    function addMsg(role, text) {
        const div = document.createElement('div');
        div.className = `bubble ${role === 'ai' ? 'ai-bubble' : 'user-bubble'}`;
        div.innerHTML = text.replace(/\n/g, '<br>');
        chatBox.appendChild(div);
        chatBox.scrollTop = chatBox.scrollHeight;
    }

    async function execute() {
        const val = userInput.value.trim();
        if(!val) return;

        addMsg('user', val);
        userInput.value = "";

        // محاكاة رد الذكاء الاصطناعي
        setTimeout(() => {
            let reply = "";
            if(val.includes("اختراق") || val.includes("هكر")) {
                reply = "<b>[PROTOCOL ACTIVE]</b>\nجاري مسح الأهداف المحيطة عبر الرادار... تم العثور على ثغرة في النظام الهدف. أنا بانتظار إشارتك النهائية للتنفيذ يا قيس.";
            } else if(val.includes("صورة") || val.includes("فيد")) {
                reply = "بدأت المعالجة العصبية لتوليد المحتوى المطلوب بدقة عالية. نوفاكي تستخدم الآن 100% من قدرة الـ GPU.";
            } else {
                reply = `سيدي قيس، طلبك (${val}) قيد المعالجة. لقد قمت بالبحث في الويب المظلم وقواعد البيانات المشفرة لتوفير أفضل إجابة لك.`;
            }
            addMsg('ai', reply);
        }, 1000);
    }

    sendBtn.onclick = execute;
    userInput.onkeydown = (e) => { if(e.key === 'Enter') execute(); };
    function quickAction(cmd) { userInput.value = cmd; execute(); }

</script>
</body>
    </html>
