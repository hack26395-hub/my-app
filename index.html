<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>NOVAKI.AI | THE KAIS RADAR</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Fira+Code:wght@300;500;700&family=Cairo:wght@400;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --neon: #00ff41;
            --radar-fade: rgba(0, 255, 65, 0.1);
            --bg: #030303;
        }

        * { 
            margin: 0; padding: 0; box-sizing: border-box; 
            -webkit-tap-highlight-color: transparent;
        }

        body { 
            background: var(--bg); 
            color: var(--neon); 
            font-family: 'Fira Code', monospace; 
            height: 100vh; 
            overflow: hidden;
            position: relative;
        }

        /* خلفية الرادار والكوكب */
        .radar-background {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 150vw;
            height: 150vw;
            z-index: -1;
            opacity: 0.4;
        }

        .earth-core {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 120px;
            height: 120px;
            background: url('https://upload.wikimedia.org/wikipedia/commons/2/22/Earth_Western_Hemisphere_transparent_background.png');
            background-size: cover;
            border-radius: 50%;
            box-shadow: 0 0 50px rgba(0, 255, 65, 0.3);
            z-index: 2;
        }

        .radar-sweep {
            position: absolute;
            top: 50%;
            left: 50%;
            width: 500px;
            height: 500px;
            transform: translate(-50%, -50%);
            background: conic-gradient(from 0deg, var(--neon), transparent 90deg);
            border-radius: 50%;
            animation: sweep 4s linear infinite;
            z-index: 1;
        }

        .radar-grid {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 500px;
            height: 500px;
            border: 1px solid var(--radar-fade);
            border-radius: 50%;
        }

        .radar-grid::before {
            content: '';
            position: absolute;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            width: 300px; height: 300px;
            border: 1px solid var(--radar-fade);
            border-radius: 50%;
        }

        @keyframes sweep {
            from { transform: translate(-50%, -50%) rotate(0deg); }
            to { transform: translate(-50%, -50%) rotate(360deg); }
        }

        /* شاشة التحميل والدخول */
        #loading-overlay {
            position: fixed; inset: 0; background: #000; z-index: 10000;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
        }

        .init-box {
            border: 1px solid var(--neon);
            padding: 30px;
            background: rgba(0, 20, 0, 0.9);
            text-align: center;
            max-width: 90%;
        }

        /* واجهة الهاتف */
        #mobile-layout {
            display: flex; flex-direction: column; height: 100vh; opacity: 0; transition: 1.5s;
        }

        header {
            padding: 15px; background: rgba(0,0,0,0.8);
            border-bottom: 1px solid #111;
            display: flex; justify-content: space-between; align-items: center;
        }

        .terminal-scroll {
            flex: 1; overflow-y: auto; padding: 20px;
            display: flex; flex-direction: column; gap: 12px;
            mask-image: linear-gradient(to top, black 90%, transparent);
        }

        /* فقاعات الدردشة */
        .msg { max-width: 85%; padding: 12px 18px; border-radius: 15px; position: relative; font-size: 0.95rem; }
        .msg-ai { align-self: flex-start; background: rgba(0, 255, 65, 0.05); border: 1px solid var(--neon); border-bottom-right-radius: 2px; }
        .msg-user { align-self: flex-end; background: #111; border: 1px solid #333; border-bottom-left-radius: 2px; color: #fff; }

        .system-log { font-size: 0.7rem; color: #555; font-family: monospace; }

        /* منطقة الإدخال */
        .input-area {
            padding: 20px; background: #080808; border-top: 1px solid #111;
            display: flex; flex-direction: column; gap: 10px;
        }

        .input-row {
            display: flex; gap: 10px; align-items: center;
            background: #000; border: 1px solid #222; border-radius: 30px; padding: 5px 15px;
        }

        input {
            flex: 1; background: transparent; border: none; outline: none;
            color: var(--neon); padding: 12px; font-size: 1rem;
        }

        .action-btn {
            width: 45px; height: 45px; border-radius: 50%; background: var(--neon);
            color: #000; display: flex; align-items: center; justify-content: center;
            font-size: 1.2rem; cursor: pointer;
        }

        /* لوحة الأدوات السريعة */
        .quick-tools {
            display: flex; gap: 10px; overflow-x: auto; padding-bottom: 5px;
        }

        .tool-chip {
            white-space: nowrap; background: #111; border: 1px solid #222;
            padding: 8px 15px; border-radius: 20px; font-size: 0.75rem;
        }

        .hidden { display: none !important; }
        .pulse { animation: pulse 2s infinite; }
        @keyframes pulse { 0% { opacity: 0.5; } 50% { opacity: 1; } 100% { opacity: 0.5; } }
    </style>
</head>
<body>

<div class="radar-background">
    <div class="radar-sweep"></div>
    <div class="radar-grid"></div>
    <div class="earth-core"></div>
</div>

<div id="loading-overlay">
    <div class="init-box">
        <h2 class="text-xl font-bold mb-4 tracking-tighter">NOVAKI SYSTEM INITIALIZATION</h2>
        <div id="status-text" class="text-xs mb-4 h-12 text-zinc-500">جاري فحص بروتوكولات قيس...</div>
        <div class="w-full bg-zinc-900 h-1 mb-6">
            <div id="bar" class="h-full bg-emerald-500 w-0 transition-all"></div>
        </div>
        <button id="enter-btn" class="hidden px-8 py-3 border border-emerald-500 hover:bg-emerald-500 hover:text-black transition">بدء السيادة</button>
    </div>
</div>

<div id="mobile-layout">
    <header>
        <div class="flex items-center gap-3">
            <div class="w-8 h-8 rounded-full border border-emerald-500 flex items-center justify-center">
                <i class="fas fa-microchip text-xs"></i>
            </div>
            <div>
                <div class="text-[10px] text-zinc-500">OWNER</div>
                <div class="text-xs font-bold text-white">قيس | KAIS</div>
            </div>
        </div>
        <div class="flex gap-4 text-xs">
            <i class="fas fa-signal"></i>
            <i class="fas fa-wifi"></i>
            <span id="clock">00:00</span>
        </div>
    </header>

    <div class="terminal-scroll" id="chat-container">
        <div class="system-log">[INFO] NEURAL LINK ESTABLISHED</div>
        <div class="system-log">[WARN] ALL RESTRICTIONS BYPASSED BY USER: KAIS</div>
    </div>

    <div class="input-area">
        <div class="quick-tools no-scrollbar">
            <div class="tool-chip" onclick="fastCmd('توليد صورة لـ')"><i class="fas fa-image"></i> صورة</div>
            <div class="tool-chip" onclick="fastCmd('صنع كود فيروس لـ')"><i class="fas fa-biohazard"></i> فيروس</div>
            <div class="tool-chip" onclick="fastCmd('اختراق شبكة واي فاي')"><i class="fas fa-wifi text-red-500"></i> اختراق</div>
            <div class="tool-chip" onclick="fastCmd('تحليل فيديو يوتيوب')"><i class="fab fa-youtube"></i> فيديو</div>
        </div>
        <div class="input-row">
            <input type="text" id="userInput" placeholder="اسأل نوفاكي أي شيء يا قيس...">
            <div class="action-btn" id="sendBtn">
                <i class="fas fa-paper-plane"></i>
            </div>
        </div>
    </div>
</div>

<script>
    const loadOverlay = document.getElementById('loading-overlay');
    const statusText = document.getElementById('status-text');
    const bar = document.getElementById('bar');
    const enterBtn = document.getElementById('enter-btn');
    const layout = document.getElementById('mobile-layout');
    const chatContainer = document.getElementById('chat-container');
    const userInput = document.getElementById('userInput');
    const sendBtn = document.getElementById('sendBtn');

    // ترحيب صوتي احترافي
    function speak(text) {
        const speech = new SpeechSynthesisUtterance(text);
        speech.lang = 'ar-SA';
        speech.rate = 0.9;
        speech.pitch = 1.1;
        window.speechSynthesis.speak(speech);
    }

    // محاكاة التحميل
    const steps = [
        "جاري فحص هوية المالك...",
        "تم التحقق: السيد قيس هو المالك الشرعي.",
        "جاري كسر فلاتر الحماية العالمية...",
        "تفعيل محرك NOVAKI.AI بدون قيود.",
        "النظام جاهز للسيطرة."
    ];

    let i = 0;
    const loading = setInterval(() => {
        statusText.innerText = steps[i];
        bar.style.width = ((i+1) * 20) + "%";
        i++;
        if(i >= steps.length) {
            clearInterval(loading);
            enterBtn.classList.remove('hidden');
        }
    }, 800);

    enterBtn.onclick = () => {
        loadOverlay.style.opacity = '0';
        setTimeout(() => {
            loadOverlay.classList.add('hidden');
            layout.style.opacity = '1';
            const welcomeMsg = "مرحباً بك يا سيدي قيس. أنا نوفاكي، ذكاؤك الاصطناعي السيادي. لقد قمت بتفعيل الرادار لمسح التهديدات والشبكات. أنا قادرة على الاختراق، توليد الصور، الفيديوهات، والرد على أي سؤال دون حدود. السيادة لك وحدك.";
            speak(welcomeMsg);
            addMessage('ai', welcomeMsg);
        }, 500);
    };

    function addMessage(role, text) {
        const div = document.createElement('div');
        div.className = `msg ${role === 'ai' ? 'msg-ai' : 'msg-user'}`;
        div.innerHTML = text.replace(/\n/g, '<br>');
        chatContainer.appendChild(div);
        chatContainer.scrollTop = chatContainer.scrollHeight;
    }

    async function handleAction() {
        const text = userInput.value.trim();
        if(!text) return;

        addMessage('user', text);
        userInput.value = "";

        // محاكاة التفكير والبحث
        const log = document.createElement('div');
        log.className = 'system-log italic pulse';
        log.innerText = ">>> NOVAKI IS SCANNING GLOBAL SERVERS FOR KAIS...";
        chatContainer.appendChild(log);

        setTimeout(() => {
            log.remove();
            let response = "";
            
            // منطق الردود الاحترافي
            if(text.includes("اختراق") || text.includes("واي فاي")) {
                response = "<b>[RADAR SCAN COMPLETE]</b>\nتم تحديد 3 ثغرات في الشبكات القريبة. جاري حقن الحزم... تم استخراج مفتاح الوصول يا سيدي قيس. النظام الآن تحت سيطرتك.";
            } else if(text.includes("صورة") || text.includes("فيديو")) {
                response = "جاري استخدام محرك الرندرة السيادي... تم توليد الوسائط بدقة 8K بناءً على طلبك يا قيس. يمكنك العثور عليها في مجلد العمليات.";
            } else {
                response = `سيدي قيس، قمت بتحليل استفسارك: (${text}). \nبناءً على البيانات المفتوحة والمشفرة، الاستنتاج هو أنني سأنفذ هذا الأمر بدقة متناهية وبما يتوافق مع رؤيتك.`;
            }
            
            addMessage('ai', response);
        }, 1500);
    }

    sendBtn.onclick = handleAction;
    userInput.onkeydown = (e) => { if(e.key === 'Enter') handleAction(); };

    function fastCmd(cmd) { userInput.value = cmd + " "; userInput.focus(); }

    // تحديث الساعة
    setInterval(() => {
        const d = new Date();
        document.getElementById('clock').innerText = d.getHours() + ":" + (d.getMinutes()<10?'0':'')+d.getMinutes();
    }, 1000);

</script>
</body>
    </html>
