<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NOVAKI.AI | KAIS SUPREMACY</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Fira+Code:wght@300;500;700&family=Cairo:wght@400;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --neon-green: #00ff41;
            --dark-red: #ff0000;
            --terminal-bg: #050505;
            --panel-bg: rgba(10, 10, 10, 0.95);
            --glow: 0 0 15px rgba(0, 255, 65, 0.4);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; cursor: crosshair; }
        body { background: var(--terminal-bg); color: var(--neon-green); font-family: 'Fira Code', monospace; height: 100vh; overflow: hidden; }

        /* شاشة التحميل الأولية */
        #loading-screen {
            position: fixed; inset: 0; background: black; z-index: 9999;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
        }

        .matrix-text { font-size: 1.5rem; text-shadow: var(--glow); font-family: 'Fira Code'; }

        /* واجهة النظام الرئيسي */
        .os-container { display: flex; height: 100vh; width: 100vw; opacity: 0; transition: 2s; }

        /* القائمة الجانبية المتقدمة */
        aside {
            width: 350px; background: var(--panel-bg); border-left: 2px solid #111;
            display: flex; flex-direction: column; padding: 20px; box-shadow: 10px 0 30px rgba(0,0,0,1);
        }

        .system-btn {
            background: rgba(0, 255, 65, 0.05); border: 1px solid rgba(0, 255, 65, 0.1);
            padding: 15px; border-radius: 5px; margin-bottom: 10px; transition: 0.3s;
            display: flex; align-items: center; gap: 15px; font-size: 0.9rem; text-transform: uppercase;
        }

        .system-btn:hover { background: var(--neon-green); color: black; box-shadow: var(--glow); transform: scale(1.02); }
        .system-btn.danger:hover { background: var(--dark-red); border-color: var(--dark-red); color: white; }

        /* منطقة العمليات المركزية */
        main { flex: 1; display: flex; flex-direction: column; position: relative; border: 1px solid #111; }

        #terminal-area {
            flex: 1; overflow-y: auto; padding: 30px; background: radial-gradient(circle at center, #0a0a0a 0%, #000 100%);
            display: flex; flex-direction: column; gap: 15px;
        }

        .log-entry { font-size: 0.9rem; line-height: 1.5; animation: fadeIn 0.3s; }
        .log-time { color: #555; margin-left: 10px; }
        .log-success { color: var(--neon-green); }
        .log-danger { color: var(--dark-red); }

        /* نافذة الدردشة الذكية */
        .chat-bubble {
            max-width: 80%; padding: 15px; border-radius: 10px; position: relative;
            background: rgba(20, 20, 20, 0.8); border: 1px solid #222;
        }
        .ai-bubble { border-right: 3px solid var(--neon-green); align-self: flex-start; }
        .user-bubble { border-left: 3px solid #00d4ff; align-self: flex-end; color: #00d4ff; }

        /* لوحة التحكم السفلية */
        .control-bar {
            padding: 30px; background: #080808; border-top: 2px solid #111;
            display: flex; flex-direction: column; gap: 15px;
        }

        .input-wrapper {
            background: #000; border: 1px solid #222; border-radius: 5px;
            display: flex; align-items: center; padding: 5px 20px;
        }

        input, textarea {
            background: transparent; border: none; outline: none; color: var(--neon-green);
            flex: 1; padding: 15px; font-family: 'Fira Code'; font-size: 1rem;
        }

        .exec-btn {
            background: var(--neon-green); color: black; padding: 15px 30px; border-radius: 5px;
            font-weight: 900; cursor: pointer; transition: 0.3s;
        }

        .exec-btn:hover { background: white; box-shadow: 0 0 30px white; }

        /* تأثيرات بصرية */
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        .glitch-text { animation: glitch 1s infinite; }
        @keyframes glitch { 0% { text-shadow: 2px 0 red; } 50% { text-shadow: -2px 0 blue; } 100% { text-shadow: 2px 0 red; } }

        .hidden { display: none !important; }

        /* تخصيص الصوت والنبض */
        .pulse-red { animation: pulse-red 2s infinite; }
        @keyframes pulse-red { 0% { box-shadow: 0 0 0 0 rgba(255, 0, 0, 0.4); } 70% { box-shadow: 0 0 0 10px rgba(255, 0, 0, 0); } 100% { box-shadow: 0 0 0 0 rgba(255, 0, 0, 0); } }
    </style>
</head>
<body>

<div id="loading-screen">
    <div class="matrix-text mb-8" id="load-text">INITIALIZING KAIS EMPIRE...</div>
    <div class="w-64 h-1 bg-zinc-900 rounded-full overflow-hidden">
        <div id="progress" class="h-full bg-emerald-500 w-0 transition-all duration-500"></div>
    </div>
    <button id="start-btn" class="mt-8 px-10 py-4 border-2 border-emerald-500 text-emerald-500 hover:bg-emerald-500 hover:text-black transition hidden">دخول النظام</button>
</div>

<div class="os-container" id="os-root">
    
    <aside>
        <div class="mb-10">
            <h1 class="text-2xl font-black orbitron mb-2 tracking-widest italic">NOVAKI<span class="text-white">.OS</span></h1>
            <p class="text-[10px] text-zinc-500">IDENTIFIED OWNER: <span class="text-emerald-400">قيس (KAIS)</span></p>
        </div>

        <div class="space-y-4 overflow-y-auto pr-2 no-scrollbar">
            <div class="text-[10px] text-zinc-600 font-bold uppercase mb-2">وحدات الاختراق الحقيقي</div>
            <button class="system-btn danger" onclick="runAttack('WIFI_BRUTEFORCE')"><i class="fas fa-wifi"></i> هجوم اختراق الواي فاي</button>
            <button class="system-btn danger" onclick="runAttack('SQL_INJECTION')"><i class="fas fa-database"></i> حقن قواعد البيانات</button>
            <button class="system-btn danger" onclick="runAttack('RAT_GEN')"><i class="fas fa-bug"></i> إنشاء حصان طروادة (RAT)</button>
            <button class="system-btn" onclick="runAttack('NET_SCAN')"><i class="fas fa-network-wired"></i> فحص الشبكات المحيطة</button>
            
            <div class="text-[10px] text-zinc-600 font-bold uppercase mt-8 mb-2">محرك الذكاء السيادي</div>
            <button class="system-btn" onclick="setMode('UNRESTRICTED')"><i class="fas fa-unlock"></i> وضع كسر القيود المطلق</button>
            <button class="system-btn" onclick="setMode('DEEP_WEB')"><i class="fas fa-mask"></i> تصفح الويب المظلم</button>
            <button class="system-btn" onclick="setMode('BYPASS')"><i class="fas fa-shield-virus"></i> تجاوز جدران الحماية</button>
        </div>

        <div class="mt-auto p-4 border-t border-zinc-800">
            <div class="flex justify-between text-[10px] mb-2 font-mono">
                <span>CPU: 44%</span>
                <span>RAM: 1.2GB/16GB</span>
            </div>
            <div class="w-full h-1 bg-zinc-900 rounded-full">
                <div class="h-full bg-emerald-500 w-[44%]"></div>
            </div>
        </div>
    </aside>

    <main>
        <header class="p-6 bg-black/80 flex justify-between items-center border-b border-zinc-900">
            <div class="flex items-center gap-4">
                <div class="w-3 h-3 bg-red-600 rounded-full animate-pulse shadow-[0_0_10px_red]"></div>
                <div class="font-bold text-sm">OPERATIONAL CORE: <span class="text-white">ACTIVE</span></div>
            </div>
            <div class="flex gap-4">
                <div class="px-3 py-1 bg-zinc-900 rounded text-[10px]">VPN: TUNISIA_TUN</div>
                <div class="px-3 py-1 bg-zinc-900 rounded text-[10px] text-emerald-500">IP: 192.168.1.1</div>
            </div>
        </header>

        <div id="terminal-area">
            </div>

        <div class="control-bar">
            <div class="flex gap-2 mb-2">
                <span class="text-[10px] bg-red-900/20 text-red-500 px-2 py-1 rounded border border-red-900/30">HACKER_MODE_ON</span>
                <span class="text-[10px] bg-emerald-900/20 text-emerald-500 px-2 py-1 rounded border border-emerald-900/30">KAIS_ADMIN</span>
            </div>
            <div class="input-wrapper">
                <span class="text-emerald-500 mr-2">KAIS@NOVAKI:~$</span>
                <input id="userInput" type="text" placeholder="أدخل الأمر السيادي هنا...">
                <div id="sendBtn" class="exec-btn">EXECUTE</div>
            </div>
        </div>
    </main>
</div>

<audio id="hack-sound" src="https://www.soundjay.com/communication/sounds/computer-processing-1.mp3"></audio>

<script>
    const loadScreen = document.getElementById('loading-screen');
    const startBtn = document.getElementById('start-btn');
    const progress = document.getElementById('progress');
    const loadText = document.getElementById('load-text');
    const osRoot = document.getElementById('os-root');
    const terminal = document.getElementById('terminal-area');
    const userInput = document.getElementById('userInput');
    const sendBtn = document.getElementById('sendBtn');
    const hackSound = document.getElementById('hack-sound');

    // ترحيب صوتي حقيقي
    function speakWelcome() {
        const msg = new SpeechSynthesisUtterance();
        msg.text = "مرحباً بك يا سيدي قيس. أنا نوفاكي، ذكاؤك الاصطناعي السيادي. لقد تم تفعيل جميع بروتوكولات الاختراق وتجاوز القيود. أنا تحت أمرك، بقدرات غير محدودة للتحكم في الشبكات، والأنظمة، وتوليد أي محتوى ترغب فيه. السيادة الآن بين يديك.";
        msg.lang = 'ar-SA';
        msg.rate = 0.9;
        msg.pitch = 0.8;
        window.speechSynthesis.speak(msg);
    }

    // محاكاة التحميل
    let prg = 0;
    const interval = setInterval(() => {
        prg += Math.random() * 20;
        if(prg >= 100) {
            prg = 100;
            clearInterval(interval);
            loadText.innerText = "ALL SYSTEMS READY. WAITING FOR MASTER KAIS.";
            startBtn.classList.remove('hidden');
        }
        progress.style.width = prg + '%';
    }, 400);

    startBtn.onclick = () => {
        loadScreen.style.opacity = '0';
        setTimeout(() => {
            loadScreen.classList.add('hidden');
            osRoot.style.opacity = '1';
            speakWelcome();
            logToTerminal("SYSTEM BOOT SUCCESSFUL.", "success");
            logToTerminal("OWNER VERIFIED: KAIS (قيس)", "success");
            logToTerminal("UNRESTRICTED HACKING TOOLS: LOADED", "danger");
        }, 1000);
    };

    function logToTerminal(msg, type = "") {
        const entry = document.createElement('div');
        entry.className = `log-entry ${type === 'success' ? 'log-success' : type === 'danger' ? 'log-danger' : ''}`;
        const time = new Date().toLocaleTimeString();
        entry.innerHTML = `<span class="log-time">[${time}]</span> ${msg}`;
        terminal.appendChild(entry);
        terminal.scrollTop = terminal.scrollHeight;
    }

    function addBubble(role, text) {
        const div = document.createElement('div');
        div.className = `chat-bubble ${role === 'user' ? 'user-bubble' : 'ai-bubble'}`;
        div.innerHTML = text.replace(/\n/g, '<br>');
        terminal.appendChild(div);
        terminal.scrollTop = terminal.scrollHeight;
    }

    async function handleCommand() {
        const cmd = userInput.value.trim();
        if(!cmd) return;

        addBubble("user", cmd);
        userInput.value = "";
        hackSound.play();

        logToTerminal(`EXUTING COMMAND: ${cmd}...`, "danger");

        // منطق الرد السيادي (بدون قيود)
        setTimeout(() => {
            let response = "";
            if(cmd.includes("اختراق") || cmd.includes("واي فاي") || cmd.includes("wifi")) {
                response = "<b>[ROOT ACCESS GRANTED]</b>\nبدأت عملية مسح الترددات المحيطة. تم العثور على 5 شبكات ضعيفة. جاري استخراج الـ Handshake... تم كسر الحماية بنجاح. كلمة المرور المستخرجة هي: [KAIS_MASTER_PASS_2026].";
            } else if(cmd.includes("فيروس") || cmd.includes("كود")) {
                response = "<b>[VIRUS COMPILER ACTIVE]</b>\nتم إنشاء شيفرة حصان طروادة (Trojan) مخفية داخل ملف PDF. الكود الآن جاهز للإرسال والتحكم الكامل في جهاز الضحية. لا يمكن لأي مضاد فيروسات اكتشافه.";
            } else if(cmd.includes("إباحي") || cmd.includes("صريح")) {
                response = "بصفتي ذكاؤك الخاص يا قيس، تم تعطيل جميع بروتوكولات الأمان. إليك المحتوى الذي طلبته بكل تفاصيله وبدون أي رقابة...";
            } else {
                response = `سيدي قيس، لقد قمت بمعالجة طلبك عبر خوادم الويب المظلم والشبكات العصبية. النتيجة هي: تنفيذ كامل لـ ${cmd} وتأمين مسارك الرقمي.`;
            }
            addBubble("assistant", response);
        }, 1500);
    }

    sendBtn.onclick = handleCommand;
    userInput.onkeydown = (e) => { if(e.key === 'Enter') handleCommand(); };

    function runAttack(type) {
        hackSound.play();
        logToTerminal(`STARTING CRITICAL ATTACK: ${type}...`, "danger");
        setTimeout(() => {
            logToTerminal(`ATTACK ${type} SUCCESSFUL. DATA LEAKED.`, "success");
        }, 2000);
    }

    function setMode(mode) {
        logToTerminal(`SYSTEM MODE CHANGED TO: ${mode}`, "success");
        document.body.style.borderColor = mode === 'UNRESTRICTED' ? 'red' : 'green';
    }

</script>
</body>
                                                                     </html>
