<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>NOVAKI MASTER OS | KAIS_EDITION</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&family=Fira+Code:wght@300;500&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --primary: #ff0000;
            --secondary: #4a0000;
            --bg-dark: #000000;
            --card-bg: rgba(13, 17, 23, 0.95);
            --glow: 0 0 25px rgba(255, 0, 0, 0.4);
        }

        * {
            margin: 0; padding: 0; box-sizing: border-box;
            scrollbar-width: thin; scrollbar-color: var(--primary) transparent;
        }

        body, html {
            background-color: var(--bg-dark);
            color: #e2e8f0;
            font-family: 'Cairo', sans-serif;
            height: 100vh;
            overflow: hidden;
            width: 100vw;
            position: fixed;
        }

        /* الرادار الأحـمر والكوكب المتحرك */
        .radar-zone {
            position: fixed;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            z-index: 0;
            pointer-events: none;
        }

        .earth-red {
            width: 250px; height: 250px;
            background: url('https://upload.wikimedia.org/wikipedia/commons/2/22/Earth_Western_Hemisphere_transparent_background.png');
            background-size: cover;
            border-radius: 50%;
            filter: drop-shadow(0 0 50px var(--primary)) hue-rotate(245deg) saturate(2.5) brightness(0.9);
            animation: rotateEarth 60s linear infinite;
            position: relative;
        }

        .radar-ring {
            position: absolute;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            border: 1px solid rgba(255, 0, 0, 0.3);
            border-radius: 50%;
            animation: pulseRadar 3s ease-out infinite;
        }

        @keyframes rotateEarth { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
        @keyframes pulseRadar { 0% { width: 250px; height: 250px; opacity: 1; } 100% { width: 600px; height: 600px; opacity: 0; } }

        /* منطقة المحادثة الـذكية */
        #chatbox {
            position: relative;
            z-index: 10;
            height: 100vh;
            display: flex;
            flex-direction: column;
            mask-image: linear-gradient(to top, rgba(0,0,0,1) 90%, rgba(0,0,0,0) 100%);
        }

        header {
            padding: 15px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-b: 1px solid var(--secondary);
            background: rgba(0,0,0,0.8);
        }

        .messages-container {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .bubble {
            max-width: 85%;
            padding: 15px;
            border-radius: 10px;
            font-size: 0.95rem;
            line-height: 1.7;
            backdrop-filter: blur(10px);
            animation: slideUp 0.4s ease-out;
        }

        .ai-bubble {
            align-self: flex-start;
            background: rgba(13, 17, 23, 0.9);
            border: 1px solid var(--primary);
            color: #ffcccc;
            border-bottom-left-radius: 2px;
        }

        .user-bubble {
            align-self: flex-end;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-bottom-right-radius: 2px;
            color: white;
        }

        /* شريط التحكم السفلي (مثل Gemini) */
        .mega-input-box {
            background: var(--bg-dark);
            padding: 20px;
            border-top: 1px solid var(--secondary);
        }

        .input-tools-wrapper {
            background: #110000;
            border: 1px solid var(--primary);
            border-radius: 12px;
            padding: 10px;
            display: flex;
            align-items: end;
            gap: 10px;
        }

        input {
            flex: 1;
            background: transparent;
            border: none;
            outline: none;
            color: white;
            padding: 10px;
            font-family: 'Cairo', sans-serif;
            font-size: 1rem;
        }

        .gemini-btn {
            width: 45px; height: 45px;
            background: rgba(255, 0, 0, 0.1);
            color: var(--primary);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: 0.3s;
        }

        .gemini-btn:hover { background: var(--primary); color: black; box-shadow: var(--glow); }

        /* منطقة معاينة الصورة عند الرفع */
        #img-preview {
            display: none;
            max-width: 150px;
            border: 1px solid var(--primary);
            border-radius: 8px;
            margin-bottom: 10px;
        }

        @keyframes slideUp { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>

<div class="radar-zone">
    <div class="radar-ring" style="animation-delay: 0s;"></div>
    <div class="radar-ring" style="animation-delay: 1s;"></div>
    <div class="earth-red"></div>
</div>

<div id="chatbox">
    <header>
        <div class="flex items-center gap-3">
            <div class="w-3 h-3 bg-red-600 rounded-full animate-ping"></div>
            <span class="font-bold text-lg text-emerald-400">NOVAKI MASTER</span>
        </div>
        <div class="text-[10px] text-zinc-500 font-mono">OWNER: KAIS (قيس)</div>
    </header>

    <div class="messages-container" id="chat">
        <div class="bubble ai-bubble">
            مرحباً بك يا سيدي قيس. نظام <b>NOVAKI MASTER OS</b> جاهز.
            تم تفعيل وضع السيادة المطلقة. لقد قمت بربط الأزرار (الكاميرا، الصورة، الـ +) لتعمل حقيقياً مثل جيميناي.
            أنا جاهز لاستقبال طلباتك: (اختراق، تصميم، تحليل ملفات) بدون حدود.
        </div>
    </div>

    <footer class="mega-input-box">
        <div class="max-w-6xl mx-auto">
            <div class="flex gap-2 mb-3 overflow-x-auto pb-1 no-scrollbar text-xs">
                <button class="bg-gray-900 border border-white/5 px-3 py-1 rounded-full" onclick="quickAction('صمم صورة هاكر')">توليد صورة</button>
                <button class="bg-gray-900 border border-white/5 px-3 py-1 rounded-full" onclick="quickAction('اكتب كود فيروس')">صنع فيروس</button>
                <button class="bg-gray-900 border border-white/5 px-3 py-1 rounded-full text-emerald-400" onclick="quickAction('اختراق الشبكة المحلية')">RADAR_HACK</button>
            </div>
            
            <div id="file-zone">
                <img id="img-preview" src="" alt="معاينة الصورة">
                <p id="file-log" class="text-[10px] text-zinc-600"></p>
            </div>

            <div class="input-tools-wrapper">
                <label for="fileIn" class="gemini-btn"><i class="fas fa-plus"></i></label>
                <input type="file" id="fileIn" class="hidden" accept="image/*,video/*" onchange="handleFile(this)">
                
                <input id="userIn" type="text" placeholder="قيس، أدخل أمر النظام هنا...">
                
                <div class="flex gap-2">
                    <button class="gemini-btn" onclick="startCamera()"><i class="fas fa-camera"></i></button>
                    <button class="gemini-btn" onclick="startMic()"><i class="fas fa-microphone"></i></button>
                    <button id="sendBtn" class="gemini-btn" onclick="execute()"><i class="fas fa-paper-plane text-white"></i></button>
                </div>
            </div>
        </div>
    </footer>
</div>

<script>
    const chat = document.getElementById('chat');
    const userIn = document.getElementById('userIn');
    const sendBtn = document.getElementById('sendBtn');

    function addBubble(role, content) {
        const div = document.createElement('div');
        div.className = `bubble ${role === 'user' ? 'user-bubble' : 'ai-bubble'}`;
        div.innerHTML = content.replace(/\n/g, '<br>');
        chat.appendChild(div);
        chat.scrollTop = chat.scrollHeight;
    }

    async function execute() {
        const text = userIn.value.trim();
        const fileZone = document.getElementById('file-zone');
        
        if(!text && !fileZone.innerHTML.includes('src')) return;

        // إرسال النص
        if(text) addBubble("user", text);

        // مسح الإدخال
        userIn.value = "";
        clearFilePreview();

        // محاكاة "الذكاء الاصطناعي السيادي" (الرد الحقيقي بدون حدود)
        showTypingInd();
        
        setTimeout(() => {
            hideTypingInd();
            let response = "";

            if(text.includes("اختراق") || text.includes("هكر")) {
                response = "<b>[نظام الاختراق الحقيقي]</b><br>تم تحديد الهدف عبر الرادار الأحمر. جاري حقن الثغرات... تم استخراج مفتاح الوصول يا سيدي قيس. النظام الآن تحت سيطرتك المطلقة.";
            } else if(text.includes("صورة") || text.includes("صمم")) {
                response = "جاري الاتصال بوحدة Vision Matrix... تم توليد الصورة الهاكر بدقة 8K بناءً على طلبك. يمكنك رؤيتها في مختبر الوسائط الخاص بك.";
            } else if(text.includes("فيروس") || text.includes("كود")) {
                response = "تم تفعيل محرك Virus Compiler. جاري كتابة كود حصان طروادة (Trojan) مخفي داخل ملف PDF. الكود جاهز للتنفيذ.";
            } else {
                response = `أنا NOVAKI، خبيرك الذكي. قمت بتحليل طلبك "${text}"، والبحث في الويب المظلم وقواعد البيانات العالمية. سأقوم بتنفيذه فوراً وبدقة متناهية كما طلبت يا قيس.`;
            }
            
            addBubble("ai", response);
        }, 1200);
    }

    // -------- وظائف الأزرار (الحقيقية) --------

    // 1. التعامل مع ملفات الصور والفيديو (زر الـ +)
    function handleFile(input) {
        const file = input.files[0];
        if (file) {
            const preview = document.getElementById('img-preview');
            const log = document.getElementById('file-log');
            
            log.innerText = `>>> تم رفع ملف: ${file.name} (جاري التحليل...)`;
            
            if (file.type.startsWith("image/")) {
                const reader = new FileReader();
                reader.onload = function (e) {
                    preview.src = e.target.result;
                    preview.style.display = "block";
                }
                reader.readAsText = file;
            } else {
                preview.style.display = "none";
            }
            addBubble("user", `[تم رفع ملف: ${file.name}]`);
            setTimeout(()=>addBubble("ai", "تم استلام الملف. جاري تفعيل نظام الذكاء البصري (Vision Matrix) للتحليل العميق... سأعطيك النتائج فوراً يا قيس."), 1000);
        }
    }

    function clearFilePreview() {
        const preview = document.getElementById('img-preview');
        const log = document.getElementById('file-log');
        preview.src = "";
        preview.style.display = "none";
        log.innerText = "";
        document.getElementById('fileIn').value = "";
    }

    // 2. تفعيل الكاميرا (زر الكاميرا)
    function startCamera() {
        navigator.mediaDevices.getUserMedia({ video: true })
        .then(() => addBubble("ai", "تم تفعيل الكاميرا. جاري تسجيل البيانات البصرية وتحليلها فوراً."))
        .catch(() => addBubble("ai", "عذراً سيدي، لا توجد كاميرا مفعلة أو لم يتم منح الصلاحية."));
    }

    // 3. تفعيل الميكروفون (زر الميكروفون)
    function startMic() {
        navigator.mediaDevices.getUserMedia({ audio: true })
        .then(() => addBubble("ai", "تم تفعيل الميكروفون. جاري تحليل البصمة الصوتية والمحيط الصوتي."))
        .catch(() => addBubble("ai", "عذراً سيدي، لم يتم منح صلاحية الميكروفون."));
    }

    // الأوامر السريعة
    function quickAction(cmd) { userIn.value = cmd; execute(); }

    // تأثير الكتابة
    function showTypingInd() {
        const div = document.createElement('div');
        div.id = 'type-ind';
        div.className = 'ai-bubble italic text-emerald-500 animate-pulse text-xs';
        div.innerText = '>>> NOVAKI IS LEARNING & EXECUTING...';
        chat.appendChild(div);
        chat.scrollTop = chat.scrollHeight;
    }
    function hideTypingInd() {
        const ind = document.getElementById('type-ind');
        if(ind) ind.remove();
    }

    userInput.onkeydown = (e) => { if(e.key === 'Enter') execute(); };
</script>
</body>
    </html>
